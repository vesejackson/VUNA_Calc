name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Job 1: Lint & Build ───────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Validate HTML structure
        run: |
          echo "Checking index.html exists..."
          test -f index.html && echo "✅ index.html found" || (echo "❌ index.html missing" && exit 1)

      - name: Validate JS files
        run: |
          echo "Checking JS files..."
          test -f assets/js/script.js && echo "✅ script.js found" || (echo "❌ script.js missing" && exit 1)

      - name: Validate CSS files
        run: |
          echo "Checking CSS files..."
          test -f assets/css/calculator.css && echo "✅ calculator.css found" || (echo "❌ calculator.css missing" && exit 1)
          test -f assets/css/styles.css && echo "✅ styles.css found" || (echo "❌ styles.css missing" && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-build-${{ github.sha }}
          path: |
            index.html
            assets/
          retention-days: 7

  # ── Job 2: Deploy via FTP ─────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy to server via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md
            .github/**

      - name: Write deployment summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Live URL | http://jackson.vudse26.cloud |" >> $GITHUB_STEP_SUMMARY
