name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Job 1: Lint & Build ───────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          test -f index.html && echo "✅ index.html found" || (echo "❌ index.html missing" && exit 1)

      - name: Validate assets
        run: |
          test -d assets && echo "✅ assets folder found" || (echo "❌ assets folder missing" && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build-${{ github.sha }}
          path: |
            index.html
            assets/
          retention-days: 7

  # ── Job 2: Docker Build & Push ────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vuna-calc:latest
            ${{ secrets.DOCKER_USERNAME }}/vuna-calc:${{ github.sha }}

  # ── Job 3: Deploy via FTP ─────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-build, docker]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy to server via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md
            Dockerfile
            .github/**

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image | ${{ secrets.DOCKER_USERNAME }}/vuna-calc:latest |" >> $GITHUB_STEP_SUMMARY
          echo "| Live URL | https://jackson.vudse26.cloud |" >> $GITHUB_STEP_SUMMARY
